name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: build-linux
            artifact: zigodb-linux-x64
          - os: ubuntu-latest
            target: build-linux-arm64
            artifact: zigodb-linux-arm64
          - os: macos-latest
            target: build-macos
            artifact: zigodb-macos-x64
          - os: macos-latest
            target: build-macos-arm64
            artifact: zigodb-macos-arm64
          - os: windows-latest
            target: build-windows
            artifact: zigodb-windows-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: korandoru/setup-zig@v1
        with:
          zig-version: master

      - name: Build with Makefile
        run: make ${{ matrix.target }}

      - name: Prepare Release Files
        shell: bash
        run: |
          mkdir -p release_files
          cp db/*.h release_files/ 2>/dev/null || true
          # Busca binários de forma robusta
          find db -maxdepth 1 -type f \( -name "*.so" -o -name "*.a" -o -name "*.dylib" -o -name "*.dll" -o -name "*.lib" -o -name "*.pdb" \) -exec cp {} release_files/ \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release_files/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: all_artifacts/**/*
          draft: true
          generate_release_notes: true
          body: |
            ## ZigoDB v0.0.3
            Extreme performance atomic embedded database.
            
            ### Performance
            - Writes: 3.1M+ msg/sec
            - Reads: 9.8M+ msg/sec
            - Latency: ~0.45µs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
