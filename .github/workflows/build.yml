name: Build and Release
on:
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: build-linux
            artifact: zigodb-linux-x64
          - os: ubuntu-latest
            target: build-linux-arm64
            artifact: zigodb-linux-arm64
          - os: macos-latest
            target: build-macos
            artifact: zigodb-macos-x64
          - os: macos-latest
            target: build-macos-arm64
            artifact: zigodb-macos-arm64
          - os: windows-latest
            target: build-windows
            artifact: zigodb-windows-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: korandoru/setup-zig@v1
        with:
          zig-version: master

      - name: Build with Makefile
        run: make ${{ matrix.target }}

      - name: Prepare Verified Files
        shell: bash
        run: |
          mkdir -p bin_out
          cp db/*.h bin_out/ 2>/dev/null || true
          find db -maxdepth 1 -type f \( -name "*.so" -o -name "*.a" -o -name "*.dylib" -o -name "*.dll" -o -name "*.lib" -o -name "*.pdb" \) -exec cp {} bin_out/ \;

      - name: Upload Verified Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin_out/
