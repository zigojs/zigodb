name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            artifact: zigodb-linux-x64
          - os: ubuntu-latest
            target: aarch64-linux-gnu
            artifact: zigodb-linux-arm64
          - os: macos-latest
            target: x86_64-macos
            artifact: zigodb-macos-x64
          - os: macos-latest
            target: aarch64-macos
            artifact: zigodb-macos-arm64
          - os: windows-latest
            target: x86_64-windows-gnu
            artifact: zigodb-windows-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig (Master/Nightly)
        uses: korandoru/setup-zig@v1
        with:
         
          zig-version: master 

      - name: Build Libraries (ReleaseFast)
        shell: bash
        run: |
          cd db
          # Shared
          zig build-lib -O ReleaseFast -target ${{ matrix.target }} -lc -dynamic -femit-h=zigo_db.h zigo_db.zig
          # Static
          zig build-lib -O ReleaseFast -target ${{ matrix.target }} -lc zigo_db.zig

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p release_files
          cp db/zigo_db.h release_files/
          find db -maxdepth 1 -type f \( -name "*.so" -o -name "*.a" -o -name "*.dylib" -o -name "*.dll" -o -name "*.lib" -o -name "*.pdb" \) -exec cp {} release_files/ \;
          cd release_files && zip -r ../${{ matrix.artifact }}.zip ./*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all_artifacts/**/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## ZigoDB v0.0.3 - Master Build
            
            ### Performance Core (28 Cores)
            - **Writes:** 3.1M+ msg/sec
            - **Reads:** 9.8M+ msg/sec
            - **Latency:** 0.45µs avg
            
            Compiled with Zig 0.16.0-dev (Master).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
